# ===========================
# Spring Security Explainer Demo
# ===========================

# ── Auth mode ─────────────────────────────────────────────────────────────────
# Switch between INTERNAL (built-in JWT) / OAUTH2 / KEYCLOAK
# Uncomment the mode you want to test:
security.auth-mode=INTERNAL
#security.auth-mode=OAUTH2
#security.auth-mode=KEYCLOAK

# ── INTERNAL mode config ──────────────────────────────────────────────────────
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=3600000
security.jwt.refresh-expiration-ms=604800000
security.jwt.issuer=testing-security-explainer-app
# security.refresh.store-mode=REDIS
# security.refresh.redis.key-prefix=security:refresh

# ── KEYCLOAK / OAUTH2 mode config ─────────────────────────────────────────────
# Uncomment the lines below when using OAUTH2 or KEYCLOAK mode:
#spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/spring-demo
#security.keycloak.realm-access-claim=realm_access
#security.keycloak.resource-access-claim=resource_access
#security.keycloak.roles-key=roles
#security.keycloak.client-id=spring-demo-app

# ── Optional Google sign-in exchange ──────────────────────────────────────────
security.google.enabled=true
security.google.issuer-uri=https://accounts.google.com
security.google.client-id=GOOGLE_CLIENT_ID
security.google.auto-link-by-email=true

# ── Public endpoints ───────────────────────────────────────────────────────────
security.public-endpoints=/public,/register,/register/admin,/login,/refresh,/logout,/google-auth-lab,/google-auth-lab/**

# ── PostgreSQL ─────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Server ─────────────────────────────────────────────────────────────────────
server.port=8080

# ── Logging ────────────────────────────────────────────────────────────────────
logging.level.com.sricharan.security=DEBUG

# ── Refresh Token Store (for INTERNAL mode) ───────────────────────────────────
# Default to in-memory storage so the demo boots cleanly in a clean environment.
# Uncomment the Redis lines when you want to exercise shared session storage locally.
#security.refresh.store-mode=REDIS
#security.refresh.redis.key-prefix=security:refresh
#spring.data.redis.host=localhost
#spring.data.redis.port=6379
