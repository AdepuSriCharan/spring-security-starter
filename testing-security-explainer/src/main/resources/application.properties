# ===========================
# Spring Security Explainer Demo
# ===========================

# JWT — pulled from .env (JWT_SECRET must be set)
security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-ms=3600000
security.jwt.refresh-expiration-ms=604800000
security.jwt.issuer=testing-security-explainer-app
security.public-endpoints=/public,/register

# PostgreSQL — credentials pulled from .env
spring.datasource.url=${a}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# Logging
logging.level.com.sricharan.security=DEBUG
